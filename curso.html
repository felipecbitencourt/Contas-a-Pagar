<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curso | Jornada do Contas a Pagar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/curso.css">
</head>
<body>
  <div class="bg-field"></div>
  <div class="grid-bg"></div>
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="page-nav-side" aria-label="Navegação entre páginas">
    <button id="btn-prev-page-side" class="page-nav-btn" type="button" aria-label="Página anterior">←</button>
    <button id="btn-next-page-side" class="page-nav-btn" type="button" aria-label="Próxima página">→</button>
  </div>

  <div class="curso-shell">
    <header class="curso-header">
      <div class="header-left">
        <button id="btn-back-menu" class="btn-header btn-header-icon" type="button" aria-label="Voltar ao menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <path d="M9 22V12h6v10"></path>
          </svg>
        </button>
        <button id="btn-toggle-sidebar" class="btn-header" type="button">☰ Navegação</button>
      </div>

      <div class="header-center">
        <div class="progress-wrap">
          <progress id="course-progress" max="100" value="0"></progress>
          <span id="progress-text">0%</span>
        </div>
      </div>

      <div class="header-right">
        <button id="btn-settings-placeholder" class="btn-header btn-header-icon" type="button" aria-label="Configurações">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33
              1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51
              1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06
              a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09
              a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06
              a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0
              a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51
              1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06
              a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09
              a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <div class="curso-layout">
      <aside id="curso-sidebar" class="curso-sidebar" aria-label="Navegação do curso">
        <div class="sidebar-title">Jornada do Contas a Pagar</div>
        <nav id="curso-menu" class="curso-menu"></nav>
      </aside>

      <main class="curso-content" id="curso-content" tabindex="-1">
        <div class="content-badge" id="content-badge">Módulo 1 · Slide 3</div>
        <h1 id="content-title">O que é o Contas a Pagar</h1>
        <div id="content-body" class="content-body"></div>
      </main>
    </div>
  </div>

  <script src="./assets/curso-interativos.js"></script>
  <script src="./assets/curso.js"></script>
</body>
</html>
